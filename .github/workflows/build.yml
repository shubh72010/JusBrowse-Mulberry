name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-37" "build-tools;37.0.0" >/dev/null 2>&1 || true
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew lintDebug --no-daemon

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-37" "build-tools;37.0.0" >/dev/null 2>&1 || true
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew testDebugUnitTest --no-daemon
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: app/build/reports/tests/

  assemble-debug:
    name: Assemble Debug
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-37" "build-tools;37.0.0" "ndk;27.0.12077973" >/dev/null 2>&1 || true
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android ~/.config/.android
          keytool -genkey -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          ln -sf "$HOME/.android/debug.keystore" "$HOME/.config/.android/debug.keystore"
      - run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: app/build/outputs/apk/debug/

  assemble-release:
    name: Assemble Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-37" "build-tools;37.0.0" "ndk;27.0.12077973" >/dev/null 2>&1 || true
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android ~/.config/.android
          keytool -genkey -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          ln -sf "$HOME/.android/debug.keystore" "$HOME/.config/.android/debug.keystore"
      - run: ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/